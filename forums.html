
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,td,input,textarea,select,button{font-family:Verdana,Geneva,sans-serif;font-size:11px;color:#000}
.page{background:#c0c9d9;padding:8px}
.gbox{background:#e8ecf5;border:1px solid #9aaac0;margin-bottom:8px}
.ghead{background:#4a6ea8;color:#fff;font-weight:bold;padding:3px 8px;font-size:11px}
.gbody{padding:8px}
.trow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.trow label{font-size:10px;font-weight:bold;color:#222;min-width:68px}
.trow input{font-family:Verdana;font-size:11px;border:1px solid #999;padding:2px 4px;background:#fff;flex:1}
.pf{background:#f2f5fc;border:1px solid #b0bcd4;padding:7px 8px;margin-bottom:5px}
.pf-hd{font-size:10px;font-weight:bold;color:#4a6ea8;margin-bottom:5px}
.pf-layout{display:flex;gap:10px;flex-wrap:wrap}
.av-col{display:flex;flex-direction:column;align-items:center;gap:4px;width:88px;flex-shrink:0}
.av-drop{width:80px;height:90px;border:2px dashed #8a9ab8;background:#d4dae8;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.av-drop img.av-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2}
.av-drop-txt{font-size:9px;color:#556;text-align:center;line-height:1.4;padding:4px;position:relative;z-index:1}
.av-drop.has-img .av-drop-txt{display:none}
input[type=file]{display:none}
.flds{flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px}
.fr{display:flex;align-items:flex-start;gap:5px}
.fr label{font-size:10px;font-weight:bold;color:#333;min-width:70px;padding-top:3px;flex-shrink:0}
.fr input,.fr textarea{font-family:Verdana;font-size:11px;border:1px solid #aaa;padding:2px 4px;background:#fff;flex:1}
.fr textarea{height:46px;resize:vertical}
.bdg-row{display:flex;gap:3px;flex-wrap:wrap}
.bopt{font-size:9px;border:1px solid #aaa;padding:1px 5px;cursor:pointer;background:#e4e4e4;font-family:Verdana;font-weight:bold}
.bopt.on{background:#4a6ea8;color:#fff;border-color:#2a4e88}
.btn{font-family:Verdana;font-size:11px;font-weight:bold;border:1px solid #7a8aaa;padding:3px 11px;cursor:pointer;background:#dce4f4}
.btn:hover{background:#c4ceea}
.btn-go{background:#4a6ea8;color:#fff;border-color:#2a4e88}
.btn-go:hover{background:#3a5e98}
.btn-sm{font-size:10px;padding:2px 7px}
.forum{background:#c0c9d9;border:1px solid #9aaac0}
.fbar{background:#4a6ea8;color:#fff;font-size:12px;font-weight:bold;padding:6px 10px;border-bottom:2px solid #2a4278}
.ftable{width:100%;border-collapse:collapse;table-layout:fixed}
.frow-tr{border-bottom:1px solid #8a9ab8;background:#e8ecf5}
.frow-tr:nth-child(odd){background:#edf3fb}
.frow-tr:last-child{border-bottom:none}
.fleft{width:118px;min-width:118px;vertical-align:top;background:#d0d8ec;border-right:1px solid #8a9ab8;padding:8px 7px}
.fright{vertical-align:top;background:#e8ecf5;padding:10px 12px}
.s-uname{display:block;color:#0000cc;font-weight:bold;font-size:11px;margin-bottom:4px;cursor:pointer;text-decoration:none}
.s-uname:hover{text-decoration:underline}
.s-avatar{width:70px;height:80px;border:1px solid #8a9ab8;background:#b8c4d8;overflow:hidden;margin:4px auto 6px}
.s-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.s-avatar-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888;background:#c4cede;text-align:center;line-height:1.4;padding:4px}
.badge-area{display:inline-flex;align-items:center;position:relative;margin:0 0 8px;}
.badge-hat{width:80px;height:80px;display:block;object-fit:contain;}
.badge-tag{display:none}
.badge-bc, .badge-obc, .badge-tbc, .badge-nbc{display:none}
.s-info{font-size:10px;color:#333;line-height:1.7}
.s-info br{display:block;margin:2px 0}
.s-grp{font-size:10px;color:#0000cc;cursor:pointer}
.s-grp:hover{text-decoration:underline}
.online-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#cc0000;margin-right:2px;vertical-align:middle}
.ph-title{font-size:12px;font-weight:bold;color:#000;display:block;margin-bottom:2px}
.ph-date{font-size:10px;color:#555;display:block;margin-bottom:4px}
.ph-div{height:1px;background:#b8c2d8;margin:4px 0 8px}
.ph-msg{font-size:11px;color:#111;line-height:1.55;margin-bottom:10px}
.ph-footer{display:flex;align-items:center;gap:10px}
.post-reply-btn{display:inline-flex;align-items:center;gap:2px;padding:2px 9px;background:#eef1fb;border:1px solid #9aa7c3;border-radius:12px;font-size:10px;font-weight:bold;cursor:pointer;line-height:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.8);text-transform:none}
.post-reply-btn:hover{background:#e5ebf7}
.post-reply-icon{display:none}
.post-reply-word-post{color:#cc0000}
.post-reply-word-reply{color:#0047b8}
.rpt{font-size:10px;color:#0000cc;cursor:pointer}
.rpt:hover{text-decoration:underline}
</style>

<div class="page">
<div class="gbox">
  <div class="ghead">ROBLOX Forum Generator — 2012</div>
  <div class="gbody">
    <div class="trow"><label>Thread title</label><input id="ttl" value="MINISH, #1 DARKHEART!???"></div>
    <div id="pforms"></div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button class="btn" onclick="addPost()">+ Add reply</button>
      <button class="btn btn-go" onclick="generate()">Generate thread</button>
    </div>
  </div>
</div>
<div id="fout" style="display:none">
  <div class="forum">
    <div class="fbar" id="fbar"></div>
    <table class="ftable"><tbody id="ftbody"></tbody></table>
  </div>
</div>
</div>

<script>
const BC_BADGE  = {src:'BC.png'};
const OBC_BADGE = {src:'OBC.png'};
const TBC_BADGE = {src:'TBC.jpg'};

const POST_REPLY_SVG = `<svg class="post-reply-icon" viewBox="0 0 22 16" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="22" height="16" rx="2" fill="#c0cce0" stroke="#8899aa" stroke-width="1"/>
  <polygon points="4,8 9,4 9,6 14,6 14,10 9,10 9,12" fill="#336699"/>
</svg>`;

let posts=[],pid=0;
const DEFS=[
  {un:'coolboy10000',badge:'OBC',jd:'07 Jul 2008',tp:'7776',grp:'Christians of R...',msg:'Please offer. U wanted #1 or #100 (if ur really Telamon)',dt:'04-01-2012 03:13 PM'},
  {un:'walt999',badge:'BC',jd:'16 Aug 2007',tp:'4861',grp:'LMaD SNIPERS',msg:"coolboy's chance finally xD",dt:'04-01-2012 03:13 PM'},
  {un:'BlueBed',badge:'BC',jd:'06 Jun 2011',tp:'563',grp:'',msg:"I'll buy for 562,836?",dt:'04-01-2012 03:13 PM'},
];
const BADGES=['None','BC','TBC','OBC','NBC'];

function getBadgeHTML(badge){
  if(!badge||badge==='None')return'';
  const cfgs={
    BC: {src:BC_BADGE.src},
    TBC:{src:TBC_BADGE.src},
    OBC:{src:OBC_BADGE.src},
    NBC:{src:null},
  };
  const c=cfgs[badge];if(!c||!c.src)return'';
  return`<div class="badge-area"><img class="badge-hat" src="${c.src}" alt="${badge} badge"></div>`;
}

function addPost(def){
  if(pid>=6){alert('Max 6 posts');return}
  const id=pid++;
  const d=def||DEFS[id]||{un:'user'+id,badge:'None',jd:'01 Jan 2010',tp:'100',grp:'',msg:'',dt:'04-01-2012 03:13 PM'};
  posts.push({id,img:null});
  const div=document.createElement('div');
  div.className='pf';div.id='pf-'+id;
  div.innerHTML=`<div class="pf-hd">${id===0?'Original Post':'Reply '+id}</div>
<div class="pf-layout">
  <div class="av-col">
    <div class="av-drop" id="avd-${id}" onclick="document.getElementById('fi-${id}').click()">
      <div class="av-drop-txt">Click to upload<br>your ROBLOX<br>avatar image</div>
    </div>
    <input type="file" id="fi-${id}" accept="image/*" onchange="loadImg(${id},this)">
    <div id="avs-${id}" style="font-size:9px;color:#668;text-align:center;margin-top:2px"></div>
  </div>
  <div class="flds">
    <div class="fr"><label>Username</label><input id="un-${id}" value="${d.un}"></div>
    <div class="fr"><label>Badge</label>
      <div class="bdg-row" id="br-${id}">
        ${BADGES.map(b=>`<button class="bopt${b===d.badge?' on':''}" onclick="selBadge(${id},'${b}')">${b}</button>`).join('')}
      </div>
    </div>
    <div class="fr"><label>Join date</label><input id="jd-${id}" value="${d.jd}"></div>
    <div class="fr"><label>Total posts</label><input id="tp-${id}" value="${d.tp}"></div>
    <div class="fr"><label>Group</label><input id="grp-${id}" value="${d.grp}"></div>
    <div class="fr"><label>Date/time</label><input id="dt-${id}" value="${d.dt}"></div>
    <div class="fr"><label>Message</label><textarea id="msg-${id}">${d.msg}</textarea></div>
  </div>
</div>
<div style="text-align:right;margin-top:5px"><button class="btn btn-sm" onclick="rmPost(${id})">Remove</button></div>`;
  document.getElementById('pforms').appendChild(div);
}

function loadImg(id,inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    posts.find(p=>p.id===id).img=e.target.result;
    const d=document.getElementById('avd-'+id);
    d.classList.add('has-img');
    let im=d.querySelector('img.av-img');
    if(!im){im=document.createElement('img');im.className='av-img';d.appendChild(im)}
    im.src=e.target.result;
    document.getElementById('avs-'+id).textContent='Uploaded!';
  };
  r.readAsDataURL(f);
}

function selBadge(id,v){
  document.querySelectorAll('#br-'+id+' .bopt').forEach(b=>b.classList.toggle('on',b.textContent===v));
}
function getBadge(id){const el=document.querySelector('#br-'+id+' .bopt.on');return el?el.textContent:'None'}
function rmPost(id){document.getElementById('pf-'+id)?.remove();const i=posts.findIndex(p=>p.id===id);if(i>-1)posts.splice(i,1)}

function generate(){
  const title=document.getElementById('ttl').value||'Thread';
  document.getElementById('fbar').textContent=title;
  const tb=document.getElementById('ftbody');
  tb.innerHTML='';
  posts.forEach((p,i)=>{
    const id=p.id;
    const un=document.getElementById('un-'+id)?.value||'';
    const badge=getBadge(id);
    const jd=document.getElementById('jd-'+id)?.value||'';
    const tp=document.getElementById('tp-'+id)?.value||'';
    const grp=document.getElementById('grp-'+id)?.value||'';
    const dt=document.getElementById('dt-'+id)?.value||'';
    const msg=(document.getElementById('msg-'+id)?.value||'').replace(/\n/g,'<br>');
    const ptitle=i===0?title:'Re: '+title;
    const avHTML=p.img?`<img src="${p.img}">`:`<div class="s-avatar-empty">Upload<br>avatar<br>image</div>`;
    const tr=document.createElement('tr');
    tr.className='frow-tr';
    tr.innerHTML=`<td class="fleft">
  <span class="online-dot"></span><span class="s-uname">${un}</span>
  <div class="s-avatar">${avHTML}</div>
  ${getBadgeHTML(badge)}
  <div class="s-info">Joined: ${jd}<br>Total Posts: ${tp}${grp?`<br><span class="s-grp">+ ${grp}</span>`:''}</div>
</td>
<td class="fright">
  <span class="ph-title">${ptitle}</span>
  <span class="ph-date">Posted: ${dt}</span>
  <div class="ph-div"></div>
  <div class="ph-msg">${msg}</div>
  <div class="ph-footer">
    <span class="post-reply-btn"><span class="post-reply-word-post">post</span><span class="post-reply-word-reply">reply</span></span>
    <span class="rpt">Report Abuse</span>
  </div>
</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('fout').style.display='block';
  document.getElementById('fout').scrollIntoView({behavior:'smooth',block:'nearest'});
}

addPost();addPost();addPost();
</script>
