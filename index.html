<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben's Utils</title>
  <style>
    :root {
      color: #e2e8f0;
      background: #030406;
      font-family: Inter, Verdana, Geneva, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { background: #030406; color: #e2e8f0; }
    a { color: inherit; text-decoration: none; }
    .page { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .panel { width: min(720px, 100%); padding: 32px; background: rgba(15, 23, 42, 0.96); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px; }
    .panel h1 { margin: 0 0 14px; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.04em; }
    .panel p { margin: 0 0 28px; line-height: 1.8; color: #cbd5e1; }
    .cards { display: grid; gap: 16px; }
    .card { padding: 20px; border: 1px solid rgba(148, 163, 184, 0.14); border-radius: 16px; background: rgba(15, 23, 42, 0.8); }
    .card h2 { margin: 0 0 10px; font-size: 1.15rem; color: #f8fafc; }
    .card p { margin: 0 0 18px; color: #cbd5e1; }
    .btn { display: inline-block; padding: 12px 18px; border-radius: 999px; background: #0f172a; border: 1px solid #475569; color: #f8fafc; font-weight: 700; transition: background 0.18s ease, transform 0.18s ease; }
    .btn:hover { background: #1e293b; transform: translateY(-1px); }
    .note { margin-top: 24px; font-size: 0.95rem; color: #94a3b8; }
    @media (max-width: 640px) { .panel { padding: 24px; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Ben's Utils</h1>
      <p>Simple utility launcher for your public use.</p>
      <div class="cards">
        <article class="card">
          <h2>ROBLOX Forum Generator</h2>
          <p>Open the forum thread generator tool to recreate old forums</p>
          <a class="btn" href="forums.html">Open Utility</a>
        </article>
      </div>
    </section>
